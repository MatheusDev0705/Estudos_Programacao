<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="calculator-card">
        <!-- Visor da Calculadora -->
        <div class="display-container">
                <div id="history"></div>
                <div id="display">0</div>
        
            </div>

            <!-- Teclado -->
             <div class="button-grid">
                <!-- Linha 1 -->
                <button onclick="clearDisplay()" class="btn btn-clear">AC</button>
                <button onclick="deleteDigit()" class="btn btn-del">DEL</button>
                <button onclick="appendOperator('/')" class="btn btn-operator">/</button>

                <!-- Linha 2 -->
                 <button onclick="appendNumber('7')" class="btn">7</button>
                 <button onclick="appendNumber('8')" class="btn">8</button>
                 <button onclick="appendNumber('9')" class="btn">9</button>
                 <button onclick="appendOperator('*')" class="btn btn-operator">*</button>

                <!-- Linha 3 -->
                 <button onclick="appendNumber('4')" class="btn">4</button>
                 <button onclick="appendNumber('5')" class="btn">5</button>
                 <button onclick="appendNumber('6')" class="btn">6</button>
                 <button onclick="appendOperator('-')" class="btn btn-operator">-</button>


                 <button onclick="appendNumber('3')" class="btn">4</button>
                 <button onclick="appendNumber('2')" class="btn">5</button>
                 <button onclick="appendNumber('1')" class="btn">6</button>
                 <button onclick="appendOperator('+')" class="btn btn-operator">+</button>
             </div>
    </div>
</body>
</html>
